name: Docker Image CI

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hrm-app:latest .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hrm-app:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/hrm-app:latest
            docker stop hrm-app || true
            docker rm hrm-app || true
            docker run -d -p 3000:3000 \
              --name hrm-app \
              --restart always \
              --env-file /home/${{ secrets.SERVER_USER }}/app/.env \
              ${{ secrets.DOCKER_USERNAME }}/hrm-app:latest