server {
    listen 7860;
    server_name _;

    location /api/ {
        proxy_pass https://tn0964755528-ttbe.hf.space/api/;

        proxy_http_version 1.1;

        proxy_set_header Host tn0964755528-ttbe.hf.space;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_ssl_server_name on;

        proxy_cookie_domain tn0964755528-ttbe.hf.space doamin-trong.site;
        proxy_cookie_path / /;
    }
